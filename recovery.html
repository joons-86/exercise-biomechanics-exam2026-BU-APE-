<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>답안 복구 제출</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic',sans-serif;background:#f4f4f4;display:flex;align-items:center;justify-content:center;min-height:100vh}
.box{background:#fff;border-radius:12px;padding:40px 32px;max-width:440px;width:100%;box-shadow:0 2px 20px rgba(0,0,0,.1);text-align:center}
.icon{font-size:52px;margin-bottom:16px}
h1{font-size:18px;font-weight:700;margin-bottom:8px}
p{font-size:13px;color:#555;line-height:1.8;margin-bottom:20px}
button{width:100%;background:#2c5aa0;color:#fff;border:none;border-radius:8px;padding:13px;font-size:15px;font-family:inherit;cursor:pointer;font-weight:700}
button:hover{background:#1e4080}
button:disabled{background:#aaa;cursor:not-allowed}
.result{margin-top:16px;padding:12px;border-radius:8px;font-size:13px;line-height:1.7}
.ok{background:#e8f5e9;color:#2e7d32}
.err{background:#ffebee;color:#c62828}
.warn{background:#fff8e1;color:#e65100}
</style>
</head>
<body>
<div class="box">
  <div class="icon" id="icon">📋</div>
  <h1 id="title">답안 복구 제출</h1>
  <p id="msg">이 버튼을 누르면 저장된 답안을 교수님께 전송합니다.<br>한 번만 누르고 기다려주세요.</p>
  <button id="btn" onclick="submit()">답안 전송하기</button>
  <div class="result" id="result" style="display:none"></div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbySC1XMOGnOuz6R_xHEkI5CIUvlki__sy5knu5PIYDw9i7I36QECYL0xFgpmB5jZIgK/exec';

function findData() {
  // localStorage에서 exam_result_ 로 시작하는 키 찾기
  const keys = Object.keys(localStorage).filter(k => k.startsWith('exam_result_'));
  if (keys.length === 0) return null;
  // 가장 최근 것
  const latest = keys[keys.length - 1];
  try { return JSON.parse(localStorage.getItem(latest)); }
  catch(e) { return null; }
}

window.onload = () => {
  const data = findData();
  if (!data) {
    document.getElementById('icon').textContent = '⚠️';
    document.getElementById('title').textContent = '저장된 답안 없음';
    document.getElementById('msg').textContent = '이 브라우저에 저장된 답안이 없습니다.\n다른 브라우저로 시험을 봤다면 그 브라우저에서 열어주세요.';
    document.getElementById('btn').disabled = true;
  } else {
    document.getElementById('msg').innerHTML =
      `<b>${data.studentName}</b> (${data.studentId}) 님의 답안이 발견되었습니다.<br>` +
      `제출 시각: ${data.submittedAt || '기록없음'}<br><br>` +
      `아래 버튼을 눌러 교수님께 전송하세요.`;
  }
};

async function submit() {
  const data = findData();
  if (!data) { alert('데이터 없음'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '전송 중...';
  try {
    // 복구 전송 표시
    data._recovery = true;
    data._recoveryAt = new Date().toLocaleString('ko-KR');
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    document.getElementById('icon').textContent = '✅';
    document.getElementById('title').textContent = '전송 완료';
    document.getElementById('msg').textContent = '';
    btn.style.display = 'none';
    const r = document.getElementById('result');
    r.style.display = 'block';
    r.className = 'result ok';
    r.innerHTML = `<b>${data.studentName}</b> 님의 답안이 전송되었습니다.<br>이 창을 닫고 교수님 안내를 기다려주세요.`;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '다시 시도';
    const r = document.getElementById('result');
    r.style.display = 'block';
    r.className = 'result err';
    r.innerHTML = '전송 실패. 인터넷 연결 확인 후 다시 눌러주세요.';
  }
}
</script>
</body>
</html>
